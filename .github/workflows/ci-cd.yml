# ==============================================================================
# GitHub Actions — CI/CD Pipeline for LLMOps
# ==============================================================================
#
# BRANCHING STRATEGY (GitHub Flow — Simplified):
#
#   feature/* branches
#     - Created locally for every bug fix or new feature.
#     - Pushing to a feature branch runs: Lint & Test only.
#     - Open a Pull Request to merge into main.
#     - GitHub branch protection blocks the merge until Lint & Test passes.
#
#   main branch
#     - Merged commits here run the full pipeline: Lint → Build → Deploy.
#     - Always deployable — never commit broken code directly here.
#     - Protected by GitHub branch protection rules.
#
# DAILY WORKFLOW (Copy-Paste These Commands):
#
#   # 1. Always start from main and pull latest
#   git checkout main
#   git pull origin main
#
#   # 2. Create feature branch with short descriptive name
#   git checkout -b feature/my-short-description
#
#   # 3. Make changes and commit
#   git add -A
#   git commit -m "fix: clear commit message of changes"
#
#   # 4. Push feature branch (triggers Lint & Test automatically)
#   git push origin feature/my-short-description
#
#   # 5. Open PR on GitHub: feature/my-short-description → main
#   #    - Go to https://github.com/<YOUR_GITHUB_USERNAME>/<YOUR_REPO_NAME>
#   #    - Click "Compare & pull request"
#   #    - Base: main, Compare: feature/my-short-description
#   #    - Wait for CI to finish (green checkmark = pass, red = fail)
#   #    - If FAIL: Fix locally, git add/commit/push to same branch, CI runs again
#   #    - If PASS: Click "Merge pull request" → "Confirm merge"
#
#   # 6. After merge, delete the feature branch (optional but clean)
#   git push origin --delete feature/my-short-description
#   git branch -d feature/my-short-description
#   git checkout main && git pull origin main  # back to main with latest
#
# SETUP INSTRUCTIONS:
#
# 1. GitHub Repository Variables (Settings → Variables → Actions):
#    GCP_PROJECT_ID, GCP_REGION, ARTIFACT_REGISTRY_REPO, IMAGE_NAME,
#    CLOUD_RUN_SERVICE_DEV, (optional) CLOUD_RUN_SERVICE_STAGING, CLOUD_RUN_SERVICE_PROD
#
# 2. GitHub Repository Secrets (Settings → Secrets → Actions):
#    WIF_PROVIDER, WIF_SERVICE_ACCOUNT, AGENT_SERVICE_ACCOUNT, GCS_BUCKET
#
# 3. Branch Protection (Settings → Branches → Add rule):
#    Require a pull request before merging
#    ✓ Require status checks to pass before merging → select "Lint & Test"
#    ✓ Require branches to be up to date before merging
#    ✓ Do not allow bypassing the above settings
#
# ==============================================================================

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - "feature/**"   # Lint & Test only on feature branch pushes
  pull_request:
    branches:
      - main          # Lint & Test on PR targeting main
  schedule:
    - cron: "0 2 * * *"  # Daily monitoring pipeline at 2 AM UTC
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options: [dev, staging, prod]
      run_pipeline:
        description: "Submit Vertex AI Pipeline after deploy?"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ==============================================================================
# STAGE 1: Lint & Test
# Runs on: feature branch pushes, PRs to main, push to main, workflow_dispatch.
# Skipped on: schedule (cron only runs the monitoring pipeline, not lint).
# ==============================================================================
jobs:
  lint-and-test:
    name: "Lint & Test"
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install "poetry==1.8.4"

      - name: Install dependencies
        run: |
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-ansi

      - name: Lint (ruff check)
        run: ruff check src/ serving/ kfp_pipelines/

      - name: Format check (ruff format)
        run: ruff format --check src/ serving/ kfp_pipelines/

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          GCP_PROJECT_ID: test-project
          GCS_BUCKET: test-bucket

  # ==============================================================================
  # STAGE 2: Build & Push Docker Image
  # Only runs on push to main branch or manual workflow_dispatch.
  # Feature branch pushes and PRs are explicitly excluded.
  # Uses docker/build-push-action for reliable builds with BuildKit caching.
  # ==============================================================================
  build:
    name: "Build & Push Docker Image"
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      full_image: ${{ steps.meta.outputs.full_image }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate configuration
        run: |
          MISSING=""
          # Check Variables
          [ -z "${{ vars.GCP_PROJECT_ID }}" ]         && MISSING="${MISSING} vars.GCP_PROJECT_ID"
          [ -z "${{ vars.GCP_REGION }}" ]              && MISSING="${MISSING} vars.GCP_REGION"
          [ -z "${{ vars.ARTIFACT_REGISTRY_REPO }}" ]  && MISSING="${MISSING} vars.ARTIFACT_REGISTRY_REPO"
          [ -z "${{ vars.IMAGE_NAME }}" ]              && MISSING="${MISSING} vars.IMAGE_NAME"
          # Check Secrets (can only test if they're non-empty)
          [ -z "${{ secrets.WIF_PROVIDER }}" ]         && MISSING="${MISSING} secrets.WIF_PROVIDER"
          [ -z "${{ secrets.WIF_SERVICE_ACCOUNT }}" ]  && MISSING="${MISSING} secrets.WIF_SERVICE_ACCOUNT"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required configuration:${MISSING}"
            echo "See workflow comments for setup instructions."
            exit 1
          fi
          echo "✓ All required configuration present."

      - name: Compute image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REGISTRY="${{ vars.GCP_REGION }}-docker.pkg.dev"
          REPO="${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPO }}"
          IMAGE="${REGISTRY}/${REPO}/${{ vars.IMAGE_NAME }}"

          echo "image_tag=${SHORT_SHA}"           >> "$GITHUB_OUTPUT"
          echo "full_image=${IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE}:latest"     >> "$GITHUB_OUTPUT"

          echo "### Docker Image" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`${SHORT_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${IMAGE}:${SHORT_SHA}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.full_image }}
            ${{ steps.meta.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==============================================================================
  # STAGE 3: Deploy to Cloud Run
  #
  # Single deploy job that determines the target environment dynamically.
  # - push events → deploy to dev
  # - workflow_dispatch → deploy to selected environment
  #
  # IMAGE URI is computed locally from Variables (not from cross-job output)
  # to avoid GitHub's secret-masking of cross-job outputs.
  # ==============================================================================
  deploy:
    name: "Deploy to ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}"
    needs: build
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}

    steps:
      - name: Determine environment and service
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            ENV="dev"
          fi
          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"

          # Map environment to Cloud Run service name
          case "${ENV}" in
            dev)     SERVICE="${{ vars.CLOUD_RUN_SERVICE_DEV }}" ;;
            staging) SERVICE="${{ vars.CLOUD_RUN_SERVICE_STAGING }}" ;;
            prod)    SERVICE="${{ vars.CLOUD_RUN_SERVICE_PROD }}" ;;
            *)       echo "::error::Unknown environment: ${ENV}"; exit 1 ;;
          esac

          if [ -z "${SERVICE}" ]; then
            echo "::error::Cloud Run service not configured for env: ${ENV}. Set CLOUD_RUN_SERVICE_$(echo ${ENV} | tr '[:lower:]' '[:upper:]') in GitHub Variables."
            exit 1
          fi

          echo "service=${SERVICE}" >> "$GITHUB_OUTPUT"
          echo "Deploying to: ${SERVICE} (${ENV})"

      - name: Compute image URI
        id: image
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REGISTRY="${{ vars.GCP_REGION }}-docker.pkg.dev"
          URI="${REGISTRY}/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REGISTRY_REPO }}/${{ vars.IMAGE_NAME }}:${SHORT_SHA}"
          echo "uri=${URI}" >> "$GITHUB_OUTPUT"
          echo "Deploying image: ${URI}"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Fetch secrets from Secret Manager
        id: secrets
        run: |
          # Fetch API keys and provider keys if they exist; do not fail if absent
          API_KEYS=$(gcloud secrets versions access latest \
            --secret="llmops-api-keys" --project="${{ vars.GCP_PROJECT_ID }}" 2>/dev/null || echo "")
          OPENAI_KEY=$(gcloud secrets versions access latest \
            --secret="llmops-openai-key" --project="${{ vars.GCP_PROJECT_ID }}" 2>/dev/null || echo "")
          ANTHROPIC_KEY=$(gcloud secrets versions access latest \
            --secret="llmops-anthropic-key" --project="${{ vars.GCP_PROJECT_ID }}" 2>/dev/null || echo "")

          # Mask in logs
          [ -n "$API_KEYS" ]     && echo "::add-mask::${API_KEYS}"
          [ -n "$OPENAI_KEY" ]   && echo "::add-mask::${OPENAI_KEY}"
          [ -n "$ANTHROPIC_KEY" ] && echo "::add-mask::${ANTHROPIC_KEY}"

          echo "api_keys=${API_KEYS}"         >> "$GITHUB_OUTPUT"
          echo "openai_key=${OPENAI_KEY}"     >> "$GITHUB_OUTPUT"
          echo "anthropic_key=${ANTHROPIC_KEY}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ steps.env.outputs.service }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ steps.image.outputs.uri }}
          flags: >-
            --service-account=${{ secrets.AGENT_SERVICE_ACCOUNT }}
          env_vars: |
            GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }}
            GCP_LOCATION=${{ vars.GCP_REGION }}
            GCS_BUCKET=${{ secrets.GCS_BUCKET }}
            BQ_DATASET=llmops
            SECRET_MANAGER_ENABLED=true
            OPENAI_API_KEY=${{ steps.secrets.outputs.openai_key }}
            ANTHROPIC_API_KEY=${{ steps.secrets.outputs.anthropic_key }}

      - name: Deployment summary
        run: |
          echo "### Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Environment:** ${{ steps.env.outputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Service:** ${{ steps.env.outputs.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** ${{ steps.image.outputs.uri }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Region:** ${{ vars.GCP_REGION }}" >> "$GITHUB_STEP_SUMMARY"

  # ==============================================================================
  # STAGE 4: Submit Vertex AI Pipeline (optional)
  # Only triggers when explicitly requested via workflow_dispatch.
  # ==============================================================================
  submit-pipeline:
    name: "Submit Vertex AI Pipeline"
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_pipeline == 'true'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline dependencies
        run: pip install kfp google-cloud-aiplatform

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Compile and submit pipeline
        run: |
          python -m kfp_pipelines.compile_and_run \
            --pipeline master \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --bucket "${{ secrets.GCS_BUCKET }}" \
            --location "${{ vars.GCP_REGION }}" \
            --service-account "${{ secrets.WIF_SERVICE_ACCOUNT }}"

  # ==============================================================================
  # STAGE 5: Scheduled Monitoring Pipeline
  # Triggers on cron schedule (daily) to run the monitoring pipeline.
  # ==============================================================================
  scheduled-monitoring:
    name: "Scheduled Monitoring Pipeline"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline dependencies
        run: pip install kfp google-cloud-aiplatform

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Compile and submit monitoring pipeline
        run: |
          python -m kfp_pipelines.compile_and_run \
            --pipeline monitoring \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --bucket "${{ secrets.GCS_BUCKET }}" \
            --location "${{ vars.GCP_REGION }}" \
            --service-account "${{ secrets.WIF_SERVICE_ACCOUNT }}"

      - name: Monitoring summary
        run: |
          echo "### Scheduled Monitoring Pipeline Submitted" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger:** cron schedule" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Pipeline:** monitoring" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Project:** ${{ vars.GCP_PROJECT_ID }}" >> "$GITHUB_STEP_SUMMARY"
