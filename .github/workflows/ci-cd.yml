# ==============================================================================
# GitHub Actions — CI/CD Pipeline for LLMOps
# ==============================================================================
# Secrets required in GitHub repo Settings → Secrets → Actions:
#
#   GCP_PROJECT_ID        → project-3e17312f-26d8-4511-821
#   WIF_PROVIDER          → projects/1012647224038/locations/global/workloadIdentityPools/github-pool-dev/providers/github-provider
#   WIF_SERVICE_ACCOUNT   → llmops-cicd-dev@project-3e17312f-26d8-4511-821.iam.gserviceaccount.com
#   AGENT_SERVICE_ACCOUNT → llmops-agent-dev@project-3e17312f-26d8-4511-821.iam.gserviceaccount.com
#   GCS_BUCKET            → project-3e17312f-26d8-4511-821-llmops-dev
#
# Branch → Deploy mapping:
#   push to main or develop → build image + deploy to llmops-agent-dev (Cloud Run)
#   workflow_dispatch       → build + deploy to chosen environment
# ==============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod
      run_pipeline:
        description: "Submit Vertex AI Pipeline after deploy?"
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  REGION: us-central1
  IMAGE_NAME: llmops-agent
  AR_REPO: llmops-agent-dev
  CR_SERVICE_DEV: llmops-agent-dev
  CR_SERVICE_STAGING: llmops-agent-staging
  CR_SERVICE_PROD: llmops-agent-prod

# ==============================================================================
# Stage 1: Lint & Test — runs on every push and PR
# ==============================================================================
jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.GCP_PROJECT_ID }}" ]        && MISSING="${MISSING} GCP_PROJECT_ID"
          [ -z "${{ secrets.WIF_PROVIDER }}" ]          && MISSING="${MISSING} WIF_PROVIDER"
          [ -z "${{ secrets.WIF_SERVICE_ACCOUNT }}" ]   && MISSING="${MISSING} WIF_SERVICE_ACCOUNT"
          [ -z "${{ secrets.AGENT_SERVICE_ACCOUNT }}" ] && MISSING="${MISSING} AGENT_SERVICE_ACCOUNT"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required GitHub Secrets:${MISSING}"
            exit 1
          fi
          echo "All required secrets present."

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install linting tools
        run: uv pip install --system ruff mypy

      - name: Lint with ruff
        run: ruff check src/ serving/ kfp_pipelines/

      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true

      - name: Install project for tests
        run: uv pip install --system pytest pytest-cov ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --cov=src/llmops_pipeline --cov-report=xml
        continue-on-error: true

# ==============================================================================
# Stage 2: Build & Push Docker image to Artifact Registry
# Runs on every push to main/develop (not on PRs)
# ==============================================================================
  build:
    name: Build & Push Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write

    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
      short_sha: ${{ steps.meta.outputs.short_sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set up Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Compute image URI
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BASE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.IMAGE_NAME }}"
          IMAGE_URI="${BASE}:${SHORT_SHA}"
          IMAGE_LATEST="${BASE}:latest"
          echo "image_uri=${IMAGE_URI}"       >> $GITHUB_OUTPUT
          echo "image_latest=${IMAGE_LATEST}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}"       >> $GITHUB_OUTPUT
          echo "Will build and push: ${IMAGE_URI}"

      - name: Build Docker image
        run: |
          docker build \
            --tag "${{ steps.meta.outputs.image_uri }}" \
            --tag "${{ steps.meta.outputs.image_latest }}" \
            --build-arg BUILD_SHA="${{ github.sha }}" \
            .

      - name: Push Docker image
        run: |
          docker push "${{ steps.meta.outputs.image_uri }}"
          docker push "${{ steps.meta.outputs.image_latest }}"
          echo "Pushed: ${{ steps.meta.outputs.image_uri }}"

# ==============================================================================
# Stage 3a: Deploy to Dev
# Triggers: every push to main or develop, OR workflow_dispatch environment=dev
# Cloud Run service: llmops-agent-dev (exists in GCP)
# ==============================================================================
  deploy-dev:
    name: Deploy to Dev
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    permissions:
      contents: read
      id-token: write
    environment: dev

    steps:
      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run (dev)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CR_SERVICE_DEV }}
          region: ${{ env.REGION }}
          image: ${{ needs.build.outputs.image_uri }}
          flags: >-
            --service-account=${{ secrets.AGENT_SERVICE_ACCOUNT }}
            --set-env-vars=GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GCP_LOCATION=${{ env.REGION }},GCS_BUCKET=${{ secrets.GCS_BUCKET }}

# ==============================================================================
# Stage 3b: Deploy to Staging
# Triggers: only via workflow_dispatch with environment=staging
# NOTE: Create llmops-agent-staging Cloud Run service first via Terraform
# ==============================================================================
  deploy-staging:
    name: Deploy to Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    permissions:
      contents: read
      id-token: write
    environment: staging

    steps:
      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run (staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CR_SERVICE_STAGING }}
          region: ${{ env.REGION }}
          image: ${{ needs.build.outputs.image_uri }}
          flags: >-
            --service-account=${{ secrets.AGENT_SERVICE_ACCOUNT }}
            --set-env-vars=GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GCP_LOCATION=${{ env.REGION }},GCS_BUCKET=${{ secrets.GCS_BUCKET }}

# ==============================================================================
# Stage 3c: Deploy to Production
# Triggers: only via workflow_dispatch with environment=prod
# Requires manual approval gate configured in GitHub Environment settings
# ==============================================================================
  deploy-prod:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    permissions:
      contents: read
      id-token: write
    environment:
      name: prod

    steps:
      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run (prod)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.CR_SERVICE_PROD }}
          region: ${{ env.REGION }}
          image: ${{ needs.build.outputs.image_uri }}
          flags: >-
            --service-account=${{ secrets.AGENT_SERVICE_ACCOUNT }}
            --set-env-vars=GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GCP_LOCATION=${{ env.REGION }},GCS_BUCKET=${{ secrets.GCS_BUCKET }}
            --min-instances=1

# ==============================================================================
# Stage 4: Submit Vertex AI Pipeline
# Triggers: only when run_pipeline=true in workflow_dispatch
# ==============================================================================
  submit-pipeline:
    name: Submit Vertex AI Pipeline
    needs: deploy-dev
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_pipeline == 'true'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pipeline dependencies
        run: pip install kfp google-cloud-aiplatform

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Compile and submit master pipeline
        run: |
          python -m kfp_pipelines.compile_and_run \
            --pipeline master \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --bucket "${{ secrets.GCS_BUCKET }}" \
            --location "${{ env.REGION }}"
