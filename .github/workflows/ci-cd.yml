# ==============================================================================
# GitHub Actions — CI/CD Pipeline for LLMOps
# ==============================================================================
# Stages:
#   1. Lint & Test (on every push/PR)
#   2. Build Docker image → push to Artifact Registry
#   3. Deploy to Cloud Run (dev → staging → prod with approval gates)
#   4. Compile & submit Vertex AI Pipelines
# ==============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod
      run_pipeline:
        description: "Submit Vertex AI Pipeline after deploy?"
        required: false
        default: false
        type: boolean

# Prevent concurrent deployments
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  REGION: us-central1
  IMAGE_NAME: llmops-agent

jobs:
  # ---- Stage 1: Lint & Test --------------------------------------------------
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.WIF_PROVIDER }}" ]        && MISSING="${MISSING} WIF_PROVIDER"
          [ -z "${{ secrets.WIF_SERVICE_ACCOUNT }}" ] && MISSING="${MISSING} WIF_SERVICE_ACCOUNT"
          [ -z "${{ secrets.GCP_PROJECT_ID }}" ]      && MISSING="${MISSING} GCP_PROJECT_ID"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required GitHub Secrets:${MISSING}"
            echo "Go to: GitHub repo → Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Lint with ruff
        run: |
          uv pip install --system ruff
          ruff check src/ serving/ kfp_pipelines/

      - name: Type check with mypy
        run: |
          uv pip install --system mypy
          mypy src/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: |
          uv pip install --system pytest pytest-cov
          pytest tests/ -v --cov=src/llmops_pipeline --cov-report=xml
        continue-on-error: true

  # ---- Stage 2: Build & Push Docker Image ------------------------------------
  build:
    name: Build Docker Image
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write  # Required for WIF

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_uri: ${{ steps.meta.outputs.image_uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Configure Docker and resolve image path
        id: meta
        run: |
          # Use the project ID from the dedicated secret (most reliable)
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          echo "Resolved project: ${PROJECT_ID}"

          # Authenticate Docker to Artifact Registry
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

          # Build the full image URI from known parts:
          # REGION-docker.pkg.dev / PROJECT_ID / REPO_NAME / IMAGE_NAME : TAG
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          REGISTRY="${{ env.REGION }}-docker.pkg.dev/${PROJECT_ID}/llmops-agent-dev"
          IMAGE_URI="${REGISTRY}/${{ env.IMAGE_NAME }}:${SHORT_SHA}"
          IMAGE_LATEST="${REGISTRY}/${{ env.IMAGE_NAME }}:latest"

          echo "image_uri=${IMAGE_URI}"   >> $GITHUB_OUTPUT
          echo "image_latest=${IMAGE_LATEST}" >> $GITHUB_OUTPUT
          echo "project_id=${PROJECT_ID}" >> $GITHUB_OUTPUT
          echo "Building: ${IMAGE_URI}"

      - name: Build and push Docker image
        id: build
        run: |
          docker build \
            --tag ${{ steps.meta.outputs.image_uri }} \
            --tag ${{ steps.meta.outputs.image_latest }} \
            --build-arg BUILD_SHA=${{ github.sha }} \
            .
          docker push ${{ steps.meta.outputs.image_uri }}
          docker push ${{ steps.meta.outputs.image_latest }}

          # Capture immutable digest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ steps.meta.outputs.image_uri }} | cut -d@ -f2)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

  # ---- Stage 3a: Deploy to Dev -----------------------------------------------
  deploy-dev:
    name: Deploy → Dev
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    permissions:
      contents: read
      id-token: write
    environment: dev

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set PROJECT_ID env var
        run: echo "PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" >> $GITHUB_ENV

      - name: Deploy to Cloud Run (dev)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: llmops-agent-dev
          region: ${{ env.REGION }}
          image: ${{ needs.build.outputs.image_uri }}
          flags: |
            --service-account=${{ secrets.AGENT_SERVICE_ACCOUNT }}
            --set-env-vars=GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCP_LOCATION=${{ env.REGION }}

  # ---- Stage 3b: Deploy to Staging -------------------------------------------
  deploy-staging:
    name: Deploy → Staging
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    permissions:
      contents: read
      id-token: write
    environment: staging

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set PROJECT_ID env var
        run: echo "PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" >> $GITHUB_ENV

      - name: Deploy to Cloud Run (staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: llmops-agent-staging
          region: ${{ env.REGION }}
          image: ${{ needs.build.outputs.image_uri }}
          flags: |
            --service-account=${{ secrets.AGENT_SERVICE_ACCOUNT }}
            --set-env-vars=GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCP_LOCATION=${{ env.REGION }}

  # ---- Stage 3c: Deploy to Production (manual approval) ----------------------
  deploy-prod:
    name: Deploy → Production
    needs: [build, deploy-staging]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    permissions:
      contents: read
      id-token: write
    environment:
      name: prod
      # Requires manual approval in GitHub Environment settings

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set PROJECT_ID env var
        run: echo "PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" >> $GITHUB_ENV

      - name: Deploy to Cloud Run (prod)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: llmops-agent-prod
          region: ${{ env.REGION }}
          image: ${{ needs.build.outputs.image_uri }}
          flags: |
            --service-account=${{ secrets.AGENT_SERVICE_ACCOUNT }}
            --set-env-vars=GCP_PROJECT_ID=${{ env.PROJECT_ID }},GCP_LOCATION=${{ env.REGION }}
            --min-instances=1

  # ---- Stage 4: Submit Vertex AI Pipeline ------------------------------------
  submit-pipeline:
    name: Submit Vertex AI Pipeline
    needs: deploy-dev
    runs-on: ubuntu-latest
    if: github.event.inputs.run_pipeline == 'true'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install kfp google-cloud-aiplatform

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Set PROJECT_ID env var
        run: echo "PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" >> $GITHUB_ENV

      - name: Compile and submit master pipeline
        run: |
          python -m kfp_pipelines.compile_and_run \
            --pipeline master \
            --project ${{ env.PROJECT_ID }} \
            --bucket ${{ secrets.GCS_BUCKET }} \
            --location ${{ env.REGION }}
