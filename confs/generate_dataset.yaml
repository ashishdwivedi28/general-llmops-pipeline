# QA Dataset Generation Config
job:
  KIND: GenerateDatasetJob
  project: ${oc.env:GCP_PROJECT_ID}
  location: ${oc.env:GCP_LOCATION,us-central1}
  gcs_documents_path: "data/documents/"
  output_csv_path: "data/datasets/rag_eval.csv"
  output_json_path: "data/datasets/rag_eval.json"
  num_questions_per_chunk: 2
  model: "gemini-2.0-flash"
