# Evaluation Configuration
# ============================================================================
# Controls how Pipeline 2 (Optimization) evaluates prompt × model combinations.
# Supports Gemini-as-judge and RAGAS-style metrics.
# ============================================================================

# --- Offline Evaluation (Pipeline 2) -----------------------------------------
offline:
  # Evaluation dataset path (generated by GenerateDatasetJob)
  eval_dataset_csv: "data/datasets/rag_eval.csv"
  eval_dataset_json: "data/datasets/rag_eval.json"

  # Models to evaluate (LiteLLM names — must also exist in models.yaml)
  models:
    - "vertex_ai/gemini-2.0-flash"

  # Prompt versions to evaluate (by version number)
  # Empty list = evaluate all available versions in the prompt registry
  prompt_versions: []

  # Metrics and their minimum thresholds for the quality gate
  metrics:
    answer_relevance:
      threshold: 0.70
      direction: "higher_is_better"
    faithfulness:
      threshold: 0.65
      direction: "higher_is_better"
    toxicity:
      threshold: 0.10
      direction: "lower_is_better"

  # Evaluator configuration
  evaluator:
    type: "gemini_judge"
    model: "vertex_ai/gemini-2.0-flash"
    temperature: 0.0

  # Quality gate: must ALL metrics pass?
  quality_gate:
    require_all: true
    # If false, deploy even if some non-critical metrics fail
    fail_on_degradation: true
    # Allow deployment if scores improved even if below absolute threshold
    allow_relative_improvement: false

  # Auto-deploy the best combo if quality gate passes
  auto_deploy: true

# --- Online Evaluation (Pipeline 4 — Monitoring) -----------------------------
online:
  # Window of production traces to evaluate
  monitoring_window_days: 7

  # Max traces to sample
  max_traces: 500

  # Metrics (same schema as offline)
  metrics:
    answer_relevance:
      threshold: 0.70
      direction: "higher_is_better"
    faithfulness:
      threshold: 0.65
      direction: "higher_is_better"
    toxicity:
      threshold: 0.10
      direction: "lower_is_better"

  # Evaluator (can be different from offline evaluator)
  evaluator:
    type: "gemini_judge"
    model: "vertex_ai/gemini-2.0-flash"
    temperature: 0.0

# --- A/B Testing (Prompt Traffic Splitting) -----------------------------------
ab_testing:
  enabled: false
  # Traffic split — keys are prompt version strings, values are weights (sum=1.0)
  # Example: {"v1": 0.8, "v2": 0.2} routes 80% to v1 and 20% to v2
  traffic_split: {}
