# Feature Engineering Pipeline Config
job:
  KIND: FeatureEngineeringJob
  project: ${oc.env:GCP_PROJECT_ID}
  location: ${oc.env:GCP_LOCATION,us-central1}
  gcs_bucket: "${oc.env:GCP_PROJECT_ID}-llmops-dev"
  embedding_model: "text-embedding-004"
  embedding_dimensions: 768
  documents_path: "data/documents/"
  chunk_size: 1000
  chunk_overlap: 200
  index_display_name: "llmops-vector-index"
  endpoint_display_name: "llmops-vector-endpoint"
